name: Build and Deploy (production)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn clean package -DskipTests

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Write env file
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
          PROD_DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          PROD_ADMIN_USERNAME: ${{ secrets.PROD_ADMIN_USERNAME }}
          PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
          PROD_ADMIN_NAME: ${{ secrets.PROD_ADMIN_NAME }}
          PROD_ADMIN_EMAIL: ${{ secrets.PROD_ADMIN_EMAIL }}
        run: |
          {
            printf 'SPRING_PROFILES_ACTIVE=prod\n'
            printf 'SERVER_PORT=8083\n'
            printf 'DB_URL=%s\n' "$PROD_DB_URL"
            printf 'DB_USERNAME=%s\n' "$PROD_DB_USERNAME"
            printf 'DB_PASSWORD=%s\n' "$PROD_DB_PASSWORD"
            printf 'JWT_SECRET=%s\n' "$PROD_JWT_SECRET"
            printf 'APP_ADMIN_USERNAME=%s\n' "$PROD_ADMIN_USERNAME"
            printf 'APP_ADMIN_PASSWORD=%s\n' "$PROD_ADMIN_PASSWORD"
            printf 'APP_ADMIN_NAME=%s\n' "$PROD_ADMIN_NAME"
            printf 'APP_ADMIN_EMAIL=%s\n' "$PROD_ADMIN_EMAIL"
          } > /tmp/app-prod.env

      - name: Upload JAR and env to EC2
        run: |
          scp -i ~/.ssh/deploy_key /tmp/app-prod.env \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/chem-os/.env"
          scp -i ~/.ssh/deploy_key target/chem-os-*.jar \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/chem-os/chem-os-new.jar"
          scp -i ~/.ssh/deploy_key scripts/deploy-prod.sh \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy-prod.sh"
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo mv /tmp/deploy-prod.sh /opt/chem-os/deploy-prod.sh && sudo chmod +x /opt/chem-os/deploy-prod.sh"

      - name: Run deploy script on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo /opt/chem-os/deploy-prod.sh"

      - name: Health check
        run: |
          echo "Waiting 20s for app to start..."
          sleep 20
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.EC2_HOST }}:8083/actuator/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 60s — deployment may have rolled back"
          exit 1
